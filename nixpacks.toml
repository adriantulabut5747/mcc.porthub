[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.fileinfo", "php83Extensions.openssl", "composer"]

[phases.build]
cmds = ["composer install --no-dev --ignore-platform-reqs", "php artisan config:clear", "php artisan key:generate --force", "php artisan migrate --force"]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"